<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EchoAI · Voice Support Assistant</title>
<style>
  :root {
    --bg: #000000;
    --bg-panel: #0a0a0a;
    --bg-elevated: #161616;
    --bg-sidebar: #050505;
    --border: #2c2c2c;
    --border-strong: #4a4a4a;
    --text: #ffffff;
    --text-dim: #9a9a9a;
    --white: #ffffff;
    --black: #000000;
    --radius: 14px;
    font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); }
  body { display: flex; height: 100vh; overflow: hidden; }

  /* ---------------- Sidebar ---------------- */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px;
  }
  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--white);
    color: var(--black);
    border: none;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .new-chat-btn:hover { opacity: 0.9; }
  .new-chat-btn svg { width: 15px; height: 15px; }

  .search-box {
    width: 100%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 10px;
    font-size: 12.5px;
    margin-bottom: 14px;
  }
  .search-box::placeholder { color: var(--text-dim); }
  .search-box:focus { outline: none; border-color: var(--white); }

  .conv-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .conv-list::-webkit-scrollbar { width: 6px; }
  .conv-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

  .conv-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    padding: 9px 10px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .conv-item:hover { background: var(--bg-elevated); }
  .conv-item.active { background: var(--bg-elevated); border-color: var(--border-strong); }
  .conv-title {
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .conv-title input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--white);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }
  .conv-title input:focus { outline: none; }
  .conv-actions { display: none; gap: 4px; flex-shrink: 0; }
  .conv-item:hover .conv-actions { display: flex; }
  .conv-actions button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px;
  }
  .conv-actions button:hover { color: var(--white); }
  .conv-actions svg { width: 13px; height: 13px; }

  .empty-sidebar {
    color: var(--text-dim);
    font-size: 12px;
    text-align: center;
    margin-top: 24px;
    padding: 0 12px;
  }

  /* ---------------- Main panel ---------------- */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 28px 24px 20px;
    min-width: 0;
  }
  .app { width: 100%; max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; height: 100%; }

  header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  .logo-mark {
    width: 34px; height: 34px; border-radius: 10px; background: var(--white);
    border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-mark svg { width: 18px; height: 18px; }
  header h1 { font-size: 17px; font-weight: 600; margin: 0; color: var(--white); }
  header p { margin: 0; font-size: 12px; color: var(--text-dim); }

  .chat {
    flex: 1; overflow-y: auto; background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px; display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  .chat::-webkit-scrollbar { width: 8px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  .empty-state { margin: auto; text-align: center; color: var(--text-dim); font-size: 13.5px; max-width: 320px; line-height: 1.5; }
  .empty-state strong { color: var(--white); display: block; margin-bottom: 6px; font-size: 15px; }

  .msg {
    max-width: 82%; padding: 10px 14px; border-radius: 12px; font-size: 14.5px; line-height: 1.45;
    white-space: pre-wrap; animation: rise 0.25s ease-out; border: 1px solid var(--border);
  }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; background: var(--white); color: var(--black); border-color: var(--white); border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--bg-elevated); border-color: var(--border); border-bottom-left-radius: 4px; }
  .msg.assistant.clarify { border: 1px dashed var(--white); }
  .msg-label { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-dim); margin-bottom: 3px; }
  .msg.user .msg-label { color: #555555; }

  .status-strip { display: flex; align-items: center; justify-content: center; gap: 8px; height: 20px; margin: 12px 0 4px; font-size: 12.5px; color: var(--text-dim); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); transition: background 0.2s; }
  .status-strip.busy .status-dot, .status-strip.recording .status-dot { background: var(--white); animation: blink 0.9s infinite ease-in-out; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  /* Text input row */
  .text-row { display: flex; gap: 8px; margin-top: 12px; }
  .text-input {
    flex: 1; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); padding: 10px 12px; font-size: 14px; font-family: inherit; resize: none;
  }
  .text-input:focus { outline: none; border-color: var(--white); }
  .text-input::placeholder { color: var(--text-dim); }
  .send-btn {
    background: var(--white); color: var(--black); border: none; border-radius: 10px; padding: 0 18px;
    font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .send-btn:disabled { background: var(--bg-elevated); color: var(--text-dim); border: 1px solid var(--border); cursor: not-allowed; }

  .dock { display: flex; align-items: center; justify-content: center; gap: 22px; padding: 16px 0 4px; }
  .mic-btn {
    position: relative; width: 72px; height: 72px; border-radius: 50%; border: 1.5px solid var(--white);
    cursor: pointer; background: var(--black); display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s ease, background 0.2s;
  }
  .mic-btn:disabled { border-color: var(--border); cursor: not-allowed; }
  .mic-btn:disabled svg path { stroke: var(--text-dim); }
  .mic-btn:not(:disabled):hover { transform: scale(1.04); }
  .mic-btn.listening { background: var(--white); animation: pulse-ring 1.4s infinite; }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.35); } 70% { box-shadow: 0 0 0 16px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }
  .mic-btn svg { width: 26px; height: 26px; }
  .mic-btn svg path { stroke: var(--white); }
  .mic-btn.listening svg path { stroke: var(--black); }
  .bars { display: flex; align-items: flex-end; gap: 3px; height: 20px; }
  .bars span { width: 4px; background: var(--black); border-radius: 2px; height: 6px; }
  .mic-btn.listening .bars span { animation: sound 1s infinite ease-in-out; }
  .bars span:nth-child(1){animation-delay:0s;} .bars span:nth-child(2){animation-delay:0.15s;}
  .bars span:nth-child(3){animation-delay:0.3s;} .bars span:nth-child(4){animation-delay:0.45s;} .bars span:nth-child(5){animation-delay:0.6s;}
  @keyframes sound { 0%,100% { height: 6px; } 50% { height: 20px; } }

  .stop-btn {
    width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-elevated);
    color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .stop-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .stop-btn:not(:disabled) { color: var(--white); border-color: var(--white); }
  .stop-btn svg { width: 15px; height: 15px; }

  .hint { text-align: center; font-size: 11.5px; color: var(--text-dim); margin-top: 8px; }

  .toast {
    position: fixed; bottom: 22px; left: calc(50% + 140px); transform: translateX(-50%) translateY(8px);
    background: var(--white); border: 1px solid var(--white); color: var(--black); padding: 10px 16px;
    border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="sidebar">
    <button id="newChatBtn" class="new-chat-btn">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      New Chat
    </button>
    <input id="searchBox" class="search-box" type="text" placeholder="Search conversations" />
    <div id="convList" class="conv-list"></div>
  </div>

  <div class="main">
    <div class="app">
      <header>
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke="#000000" stroke-width="1.6"/>
            <path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke="#000000" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <h1>EchoAI</h1>
          <p>Self-correcting voice support assistant</p>
        </div>
      </header>

      <div id="chat" class="chat">
        <div class="empty-state" id="emptyState">
          <strong>Start a conversation</strong>
          Type a message or tap the mic. Your chats are saved automatically.
        </div>
      </div>

      <div id="statusStrip" class="status-strip">
        <span class="status-dot"></span>
        <span id="statusText">Ready</span>
      </div>

      <div class="text-row">
        <textarea id="textInput" class="text-input" rows="1" placeholder="Message EchoAI…"></textarea>
        <button id="sendBtn" class="send-btn">Send</button>
      </div>

      <div class="dock">
        <button id="startBtn" class="mic-btn" title="Start Recording">
          <svg id="micIcon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z" stroke-width="1.8"/>
            <path d="M5 11a7 7 0 0 0 14 0M12 18v3" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <div id="listeningBars" class="bars" style="display:none;">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
        </button>
        <button id="stopBtn" class="stop-btn" title="Stop Recording" disabled>
          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
      <div class="hint" id="hintText">Click Start, ask your question, then Stop when finished.</div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
  const els = {
    convList: document.getElementById('convList'),
    newChatBtn: document.getElementById('newChatBtn'),
    searchBox: document.getElementById('searchBox'),
    chat: document.getElementById('chat'),
    emptyState: document.getElementById('emptyState'),
    statusStrip: document.getElementById('statusStrip'),
    statusText: document.getElementById('statusText'),
    hintText: document.getElementById('hintText'),
    toast: document.getElementById('toast'),
    startBtn: document.getElementById('startBtn'),
    stopBtn: document.getElementById('stopBtn'),
    micIcon: document.getElementById('micIcon'),
    listeningBars: document.getElementById('listeningBars'),
    textInput: document.getElementById('textInput'),
    sendBtn: document.getElementById('sendBtn'),
  };

  let currentConversationId = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let isRecording = false;
  let isProcessing = false;
  let statusTimers = [];

  function showToast(message) {
    els.toast.textContent = message;
    els.toast.classList.add('show');
    setTimeout(() => els.toast.classList.remove('show'), 3800);
  }

  function setStatus(text, mode) {
    els.statusText.textContent = text;
    els.statusStrip.classList.remove('busy', 'recording');
    if (mode) els.statusStrip.classList.add(mode);
  }

  function clearStatusProgression() {
    statusTimers.forEach(t => clearTimeout(t));
    statusTimers = [];
  }

  function runStatusProgression(steps) {
    clearStatusProgression();
    let elapsed = 0;
    steps.forEach(([label, delay]) => {
      const t = setTimeout(() => setStatus(label, 'busy'), elapsed);
      statusTimers.push(t);
      elapsed += delay;
    });
  }

  function setControlsEnabled(enabled) {
    els.startBtn.disabled = !enabled || isRecording;
    els.sendBtn.disabled = !enabled;
    els.textInput.disabled = !enabled;
  }

  function appendMessage(role, text, isClarification) {
    els.emptyState.remove();
    const bubble = document.createElement('div');
    bubble.className = 'msg ' + role + (isClarification ? ' clarify' : '');
    const label = document.createElement('span');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : (isClarification ? 'EchoAI · needs clarification' : 'EchoAI');
    bubble.appendChild(label);
    bubble.appendChild(document.createTextNode(text));
    els.chat.appendChild(bubble);
    els.chat.scrollTop = els.chat.scrollHeight;
  }

  function renderEmptyChat() {
    els.chat.innerHTML = '';
    const div = document.createElement('div');
    div.className = 'empty-state';
    div.id = 'emptyState';
    div.innerHTML = '<strong>Start a conversation</strong>Type a message or tap the mic. Your chats are saved automatically.';
    els.chat.appendChild(div);
    els.emptyState = div;
  }

  // ---------------- Conversation sidebar ----------------
  async function loadConversations(selectMostRecent = false) {
    try {
      const res = await fetch('/api/conversations');
      const data = await res.json();
      renderConversationList(data.conversations || []);
      if (selectMostRecent && data.conversations && data.conversations.length > 0) {
        await selectConversation(data.conversations[0].id);
      }
    } catch (err) {
      showToast('Could not load conversation history.');
    }
  }

  function renderConversationList(conversations) {
    els.convList.innerHTML = '';
    if (conversations.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-sidebar';
      empty.textContent = 'No conversations yet — start a new chat.';
      els.convList.appendChild(empty);
      return;
    }
    conversations.forEach(conv => {
      const item = document.createElement('div');
      item.className = 'conv-item' + (conv.id === currentConversationId ? ' active' : '');
      item.dataset.id = conv.id;

      const titleWrap = document.createElement('div');
      titleWrap.className = 'conv-title';
      titleWrap.textContent = conv.title;
      titleWrap.addEventListener('click', () => selectConversation(conv.id));

      const actions = document.createElement('div');
      actions.className = 'conv-actions';

      const renameBtn = document.createElement('button');
      renameBtn.title = 'Rename';
      renameBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>';
      renameBtn.addEventListener('click', (e) => { e.stopPropagation(); startRename(item, conv); });

      const deleteBtn = document.createElement('button');
      deleteBtn.title = 'Delete';
      deleteBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';
      deleteBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteConversation(conv.id); });

      actions.appendChild(renameBtn);
      actions.appendChild(deleteBtn);
      item.appendChild(titleWrap);
      item.appendChild(actions);
      els.convList.appendChild(item);
    });
  }

  function startRename(itemEl, conv) {
    const titleWrap = itemEl.querySelector('.conv-title');
    const input = document.createElement('input');
    input.type = 'text';
    input.value = conv.title;
    titleWrap.textContent = '';
    titleWrap.appendChild(input);
    input.focus();
    input.select();

    const commit = async () => {
      const newTitle = input.value.trim() || conv.title;
      titleWrap.textContent = newTitle;
      if (newTitle !== conv.title) {
        try {
          await fetch(`/api/conversations/${conv.id}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title: newTitle }),
          });
        } catch (err) {
          showToast('Could not rename conversation.');
        }
      }
    };

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
    });
  }

  async function deleteConversation(id) {
    if (!confirm('Delete this conversation? This cannot be undone.')) return;
    try {
      await fetch(`/api/conversations/${id}`, { method: 'DELETE' });
      if (id === currentConversationId) {
        currentConversationId = null;
        renderEmptyChat();
      }
      await loadConversations();
    } catch (err) {
      showToast('Could not delete conversation.');
    }
  }

  async function selectConversation(id) {
    if (isProcessing) return;
    currentConversationId = id;
    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.id === id);
    });
    try {
      const res = await fetch(`/api/conversations/${id}/messages`);
      const data = await res.json();
      renderEmptyChat();
      (data.messages || []).forEach(m => appendMessage(m.role === 'user' ? 'user' : 'assistant', m.content, false));
      els.chat.scrollTop = els.chat.scrollHeight;
    } catch (err) {
      showToast('Could not load this conversation.');
    }
  }

  async function createNewChat() {
    if (isProcessing) return;
    try {
      const res = await fetch('/api/conversations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: 'New Chat' }),
      });
      const conv = await res.json();
      currentConversationId = conv.id;
      renderEmptyChat();
      await loadConversations();
      document.querySelectorAll('.conv-item').forEach(el => el.classList.toggle('active', el.dataset.id === conv.id));
    } catch (err) {
      showToast('Could not start a new chat.');
    }
  }

  let searchDebounce = null;
  els.searchBox.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(async () => {
      const q = els.searchBox.value.trim();
      try {
        const res = await fetch(`/api/conversations/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        renderConversationList(data.conversations || []);
      } catch (err) { /* silent — search is non-critical */ }
    }, 300);
  });

  els.newChatBtn.addEventListener('click', createNewChat);

  // ---------------- Shared turn runner (voice + text) ----------------
  async function runAssistantTurn(userText) {
    if (isProcessing) return;
    isProcessing = true;
    setControlsEnabled(false);

    try {
      appendMessage('user', userText, false);

      runStatusProgression([
        ['Searching Knowledge…', 500],
        ['Thinking…', 500],
        ['Generating Response…', 600],
      ]);

      const llmRes = await fetch('/llm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: userText, conversation_id: currentConversationId }),
      });
      const llmData = await llmRes.json();
      clearStatusProgression();

      if (!llmRes.ok) {
        throw new Error(llmData.error || 'The assistant could not generate a response.');
      }
      if (llmData.conversation_id) currentConversationId = llmData.conversation_id;

      const answer = llmData.text.trim();
      const isClarification = /\?\s*$/.test(answer) && answer.split(' ').length < 25;
      appendMessage('assistant', answer, isClarification);
      loadConversations();

      setStatus('Speaking…', 'busy');
      const ttsRes = await fetch('/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: answer }),
      });
      if (!ttsRes.ok) {
        throw new Error('Could not generate speech for the response.');
      }
      const audioBlob = await ttsRes.blob();
      const audioUrl = URL.createObjectURL(audioBlob);
      const player = new Audio(audioUrl);
      await player.play().catch(() => {
        showToast('Autoplay was blocked by the browser. Tap anywhere to enable audio.');
      });

      setStatus('Ready', null);
      els.hintText.textContent = 'Click Start, ask your question, then Stop when finished.';
    } catch (err) {
      clearStatusProgression();
      console.error(err);
      showToast(err.message || 'Something went wrong. Please try again.');
      setStatus('Ready', null);
    } finally {
      isProcessing = false;
      setControlsEnabled(true);
      setDockState({ canStart: true, canStop: false, listening: false });
    }
  }

  // ---------------- Text send ----------------
  els.sendBtn.addEventListener('click', () => {
    const text = els.textInput.value.trim();
    if (!text || isProcessing) return;
    els.textInput.value = '';
    runAssistantTurn(text);
  });
  els.textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      els.sendBtn.click();
    }
  });

  // ---------------- Voice recording (manual start/stop only) ----------------
  function setDockState({ canStart, canStop, listening }) {
    els.startBtn.disabled = !canStart || isProcessing;
    els.stopBtn.disabled = !canStop;
    els.startBtn.classList.toggle('listening', listening);
    els.micIcon.style.display = listening ? 'none' : 'block';
    els.listeningBars.style.display = listening ? 'flex' : 'none';
  }

  async function startRecording() {
    if (isRecording || isProcessing) return;

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
      showToast('Microphone access was denied. Please allow microphone permissions and try again.');
      return;
    }

    audioChunks = [];
    try {
      mediaRecorder = new MediaRecorder(stream);
    } catch (err) {
      showToast('Recording is not supported in this browser.');
      stream.getTracks().forEach(t => t.stop());
      return;
    }

    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
      handleRecordedAudio(audioBlob);
    };

    mediaRecorder.start(); // does NOT auto-stop on silence — only the Stop button stops it
    isRecording = true;
    setDockState({ canStart: false, canStop: true, listening: true });
    setControlsEnabled(false);
    setStatus('Listening…', 'recording');
    els.hintText.textContent = "Recording — click Stop when you're finished speaking.";
  }

  function stopRecording() {
    if (!isRecording || !mediaRecorder) return;
    isRecording = false;
    mediaRecorder.stop();
    setDockState({ canStart: false, canStop: false, listening: false });
    setStatus('Transcribing…', 'busy');
    els.hintText.textContent = 'Please wait…';
  }

  async function handleRecordedAudio(audioBlob) {
    isProcessing = true;
    setControlsEnabled(false);
    try {
      const formData = new FormData();
      formData.append('audio', audioBlob, 'recording.webm');

      const sttRes = await fetch('/stt', { method: 'POST', body: formData });
      const sttData = await sttRes.json();
      if (!sttRes.ok || !sttData.text) {
        throw new Error(sttData.error || 'Could not transcribe audio.');
      }
      const transcript = sttData.text.trim();
      if (!transcript) {
        throw new Error('No speech was detected. Please try again.');
      }

      isProcessing = false; // hand off to the shared turn runner, which re-acquires the guard
      await runAssistantTurn(transcript);
    } catch (err) {
      console.error(err);
      showToast(err.message || 'Something went wrong. Please try again.');
      setStatus('Ready', null);
      isProcessing = false;
      setControlsEnabled(true);
      setDockState({ canStart: true, canStop: false, listening: false });
    }
  }

  els.startBtn.addEventListener('click', startRecording);
  els.stopBtn.addEventListener('click', stopRecording);

  // ---------------- Init ----------------
  loadConversations(true);
</script>
</body>
</html>
